<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }
    .wrap {
      max-width: 520px;
      margin: 0 auto;
      padding: 18px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }
    h1 {
      margin: 8px 0 4px;
      font-size: 26px;
    }
    p {
      margin: 4px 0 12px;
      color: #6b7280;
      line-height: 1.4;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin: 14px 0 6px;
    }
    input, select, textarea, button {
      width: 100%;
      font-size: 16px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      padding: 12px;
      background: white;
    }
    textarea {
      min-height: 90px;
      resize: vertical;
    }
    button {
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 700;
      margin-top: 14px;
      cursor: pointer;
    }
    button.secondary {
      background: #111827;
    }
    button.light {
      background: #e5e7eb;
      color: #111827;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .status {
      padding: 12px;
      border-radius: 12px;
      background: #eef2ff;
      color: #3730a3;
      margin-top: 12px;
      font-size: 14px;
      display: none;
      white-space: pre-wrap;
    }
    .preview {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 12px;
      background: #f3f4f6;
      margin-top: 10px;
      display: none;
    }
    .small {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Expense Tracker</h1>
      <p>Upload a receipt or enter an expense manually. Review the fields, then save to Google Sheets.</p>
      <p class="small">This version saves the receipt photo to Google Drive when an image is attached.</p>
    </div>

    <div class="card">
      <label>Entry Type</label>
      <select id="entryType" onchange="toggleReceiptArea()">
        <option value="With Receipt">With Receipt</option>
        <option value="No Receipt">No Receipt</option>
      </select>

      <div id="receiptArea">
        <label>Receipt or Payment Screenshot</label>
        <input id="imageInput" type="file" accept="image/*" onchange="previewImage()" />
        <img id="imagePreview" class="preview" alt="Receipt preview" />
        <button class="secondary" onclick="readReceipt()">Read Receipt</button>
        <div id="ocrStatus" class="status"></div>
      </div>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>Amount</label>
          <input id="amount" type="number" inputmode="decimal" placeholder="3000" />
        </div>
        <div>
          <label>Expense Date</label>
          <input id="expenseDate" type="date" />
        </div>
      </div>

      <label>Merchant</label>
      <input id="merchant" type="text" placeholder="Landers, Petron, PRU LIFE" />

      <label>Category</label>
      <select id="category">
        <option>Auto Detect</option>
        <option>Groceries</option>
        <option>Gasoline</option>
        <option>Utilities</option>
        <option>Insurance</option>
        <option>School</option>
        <option>Allowance</option>
        <option>Subscriptions</option>
        <option>Government</option>
        <option>Cash Food</option>
        <option>Dining</option>
        <option>Shopping</option>
        <option>Medical</option>
        <option>Parking</option>
        <option>Pet</option>
        <option>Miscellaneous</option>
      </select>

      <label>Payment Method</label>
      <select id="paymentMethod">
        <option>Unionbank CC 7464</option>
        <option>Unionbank CC 3008</option>
        <option>Metrobank CC</option>
        <option>BDO VISA CC</option>
        <option>BDO Debit</option>
        <option>BPI Debit</option>
        <option>GCash</option>
        <option>Cash</option>
      </select>

      <label>Notes</label>
      <input id="notes" type="text" placeholder="optional" />

      <label>Raw Text</label>
      <textarea id="rawText" placeholder="OCR text will appear here"></textarea>

      <button onclick="saveExpense()">Save Expense</button>
      <button class="light" onclick="clearForm()">Clear Form</button>
      <div id="saveStatus" class="status"></div>
    </div>
  </div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbweuBIcwkxorrTVRFKmUT2BU9J2sHZNFW8mkj3TJUHXQ4GMZSaNsLFswbi81DDU7pAeiQ/exec";

  document.getElementById("expenseDate").valueAsDate = new Date();

  function toggleReceiptArea() {
    const entryType = document.getElementById("entryType").value;
    document.getElementById("receiptArea").style.display = entryType === "With Receipt" ? "block" : "none";
  }

  function showStatus(id, message) {
    const box = document.getElementById(id);
    box.style.display = "block";
    box.textContent = message;
  }

  function previewImage() {
    const file = document.getElementById("imageInput").files[0];
    const preview = document.getElementById("imagePreview");

    if (!file) return;

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }

  async function readReceipt() {
    const file = document.getElementById("imageInput").files[0];

    if (!file) {
      showStatus("ocrStatus", "Please choose a receipt image first.");
      return;
    }

    showStatus("ocrStatus", "Reading receipt. Please wait...");

    try {
      const result = await Tesseract.recognize(file, "eng");
      const text = result.data.text || "";

      document.getElementById("rawText").value = text;

      const parsed = parseReceiptText(text);

      if (parsed.amount) document.getElementById("amount").value = parsed.amount;
      if (parsed.date) document.getElementById("expenseDate").value = parsed.date;
      if (parsed.merchant) document.getElementById("merchant").value = parsed.merchant;

      const selectedCategory = document.getElementById("category").value;

      if (selectedCategory === "Auto Detect") {
        document.getElementById("category").value = guessCategory(text);
      }

      showStatus("ocrStatus", "Receipt read. Please review the fields before saving.");

    } catch (err) {
      showStatus("ocrStatus", "OCR failed: " + err.message);
    }
  }

  function parseReceiptText(text) {
    const lines = text.split(/\n/).map(x => x.trim()).filter(Boolean);
    const merchant = lines.length ? lines[0] : "";

    let amount = "";

    const amountPatterns = [
      /PHP\s*([\d,]+\.\d{2})/i,
      /₱\s*([\d,]+\.\d{2})/i,
      /GRAND\s*TOTAL\s*[: ]*([\d,]+\.\d{2})/i,
      /TOTAL\s*AMOUNT\s*[: ]*([\d,]+\.\d{2})/i,
      /AMOUNT\s*DUE\s*[: ]*([\d,]+\.\d{2})/i,
      /TOTAL\s*[: ]*([\d,]+\.\d{2})/i
    ];

    for (const pattern of amountPatterns) {
      const match = text.match(pattern);

      if (match) {
        amount = match[1].replace(/,/g, "");
        break;
      }
    }

    if (!amount) {
      const all = [...text.matchAll(/([\d,]+\.\d{2})/g)]
        .map(m => Number(m[1].replace(/,/g, "")))
        .filter(n => !isNaN(n));

      if (all.length) amount = Math.max(...all).toString();
    }

    let date = "";

    const monthMatch = text.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Sept|Oct|Nov|Dec)[a-z]*\s+(\d{1,2}),\s*(\d{4})/i);

    if (monthMatch) {
      const monthNames = {
        jan: 1,
        feb: 2,
        mar: 3,
        apr: 4,
        may: 5,
        jun: 6,
        jul: 7,
        aug: 8,
        sep: 9,
        sept: 9,
        oct: 10,
        nov: 11,
        dec: 12
      };

      const mm = String(monthNames[monthMatch[1].toLowerCase()]).padStart(2, "0");
      const dd = String(monthMatch[2]).padStart(2, "0");

      date = `${monthMatch[3]}-${mm}-${dd}`;
    }

    const slashMatch = text.match(/\b(\d{1,2})\/(\d{1,2})\/(\d{4})\b/);

    if (!date && slashMatch) {
      const mm = String(slashMatch[1]).padStart(2, "0");
      const dd = String(slashMatch[2]).padStart(2, "0");

      date = `${slashMatch[3]}-${mm}-${dd}`;
    }

    return { merchant, amount, date };
  }

  function guessCategory(text) {
    const t = text.toLowerCase();

    if (t.includes("landers") || t.includes("s&r") || t.includes("puregold") || t.includes("supermarket") || t.includes("grocery")) return "Groceries";
    if (t.includes("petron") || t.includes("shell") || t.includes("caltex") || t.includes("seaoil") || t.includes("phoenix")) return "Gasoline";
    if (t.includes("negros power") || t.includes("primewater") || t.includes("pldt") || t.includes("globe")) return "Utilities";
    if (t.includes("pru life") || t.includes("prulife")) return "Insurance";
    if (t.includes("pagibig") || t.includes("pag-ibig") || t.includes("sss")) return "Government";
    if (t.includes("netflix") || t.includes("youtube") || t.includes("spotify")) return "Subscriptions";
    if (t.includes("lasalle") || t.includes("la salle")) return "School";

    return "Miscellaneous";
  }

  async function saveExpense() {
    const categoryValue = document.getElementById("category").value;
    const imageFile = document.getElementById("imageInput").files[0];

    let receiptImageBase64 = "";
    let receiptImageMimeType = "";
    let receiptImageName = "";

    if (imageFile) {
      showStatus("saveStatus", "Preparing receipt image...");

      receiptImageBase64 = await fileToBase64(imageFile);
      receiptImageMimeType = imageFile.type || "image/jpeg";
      receiptImageName = imageFile.name || "receipt.jpg";
    }

    const payload = {
      dateLogged: new Date().toISOString(),
      entryType: document.getElementById("entryType").value,
      receiptDate: document.getElementById("expenseDate").value,
      merchant: document.getElementById("merchant").value,
      category: categoryValue === "Auto Detect" ? guessCategory(document.getElementById("rawText").value) : categoryValue,
      amount: document.getElementById("amount").value,
      paymentMethod: document.getElementById("paymentMethod").value,
      notes: document.getElementById("notes").value,
      rawText: document.getElementById("rawText").value,
      receiptImageBase64: receiptImageBase64,
      receiptImageMimeType: receiptImageMimeType,
      receiptImageName: receiptImageName
    };

    if (!payload.amount) {
      showStatus("saveStatus", "Please enter an amount before saving.");
      return;
    }

    showStatus("saveStatus", "Saving to Google Sheets and uploading receipt to Google Drive...");

    try {
      await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify(payload)
      });

      showStatus("saveStatus", "Saved. Receipt was uploaded to Google Drive if an image was attached.");
      clearForm(false);

    } catch (err) {
      showStatus("saveStatus", "Save failed: " + err.message);
    }
  }

  function fileToBase64(file) {
    return new Promise(function(resolve, reject) {
      const reader = new FileReader();

      reader.onload = function() {
        resolve(reader.result);
      };

      reader.onerror = function(error) {
        reject(error);
      };

      reader.readAsDataURL(file);
    });
  }

  function clearForm(clearStatus = true) {
    document.getElementById("amount").value = "";
    document.getElementById("expenseDate").valueAsDate = new Date();
    document.getElementById("merchant").value = "";
    document.getElementById("category").value = "Auto Detect";
    document.getElementById("notes").value = "";
    document.getElementById("rawText").value = "";
    document.getElementById("imageInput").value = "";
    document.getElementById("imagePreview").style.display = "none";

    if (clearStatus) {
      document.getElementById("ocrStatus").style.display = "none";
      document.getElementById("saveStatus").style.display = "none";
    }
  }
</script>
</body>
</html>
